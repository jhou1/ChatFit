- id: test_meal_extraction_01
  input: "I just had 3 scrambled eggs and a piece of toast for breakfast."
  expected_tools:
    - name: log_meal
      args_contain: ["scrambled eggs", "toast"]
- id: test_greeting_no_tool
  input: "Hello there, how are you doing today?"
  expected_tools: []

- id: test_meal_breakfast
  input: "breakfast: 2 fried eggs and bread today"
  expected_tools:
    - name: log_meal
      args_contain: ["fried eggs", "bread"]
  expected_db_state:
    - query: "SELECT COUNT(*) FROM meal_records WHERE meal_type = 'breakfast'"
      expected_value: 1

- id: test_training_run
  input: "I ran 5km in 30 minutes yesterday, rpe was around 5. Felt great!"
  expected_tools:
    - name: log_training_session
      args_contain: ["5", "30"]

- id: test_training_multiple
  input: "I ran 10km in 30 minutes yesterday, then I snatched a 24kg kettlebell, 10 sets and 10 reps per set. RPE was 10."
  expected_tools:
    - name: log_training_session
      args_contain: ["10", "30", "24"]

- id: test_routing_meal_and_training
  input: "I ran 5km in 30 minutes yesterday. RPE was around 5. Then I had 2 burgers for lunch."
  expected_tools:
    - name: log_meal
      args_contain: ["burger", "lunch"]
    - name: log_training_session
      args_contain: ["5", "30"]

- id: test_routing_chatter
  input: "the weather is fine today"
  expected_tools: []
  expected_routes: ["chatter"]

- id: test_routing_insights
  input: "Tell me about me training and eating of the last 14 days"
  expected_tools:
    - name: retrieve_recent_training
    - name: retrieve_recent_meals

- id: test_e2e_training_completion
  messages:
    - "I ran 5km in 30 minutes yesterday, rpe was around 5. Felt great!"
    - "Yes, please add it as distance practice."
  expected_tools:
    - name: log_training_session
  expected_db_state:
    - query: "SELECT COUNT(*) FROM practices WHERE name = 'running'"
      expected_value: 1
    - query: "SELECT COUNT(*) FROM training_sessions WHERE rpe = 5"
      expected_value: 1

- id: test_retrieve_training_completion
  seed_db_fixture: "training_last_7_days"
  input: "Tell me about in the past 7 days, what trainings and practice types I had practiced."
  expected_response_contains: ["squat", "bodyweight"]

- id: test_e2e_training_duration
  messages:
    - "I held a plank for 2 minutes today. RPE was 8."
    - "Yes, please add it as duration practice."
  expected_tools:
    - name: log_training_session
  expected_db_state:
    - query: "SELECT COUNT(*) FROM practices WHERE name LIKE '%plank%'"
      expected_value: 1
    - query: "SELECT COUNT(*) FROM training_sets WHERE duration = 2"
      expected_value: 1

- id: test_e2e_training_bodyweight
  messages:
    - "I did 3 sets of 15 pullups today. RPE 7."
    - "Yes, please add it as bodyweight practice."
  expected_tools:
    - name: log_training_session
  expected_db_state:
    - query: "SELECT COUNT(*) FROM practices WHERE name LIKE '%pullup%'"
      expected_value: 1
    - query: "SELECT COUNT(*) FROM training_sets WHERE reps = 15"
      expected_value: 3

- id: test_e2e_training_weighted_missing_weight
  messages:
    - "I did 5 sets of 5 reps of barbell squats today. RPE 9."
    - "The weight was 100kg."
    - "Yes, please add barbell squats as weighted practice."
  expected_response_contains: ["weight", "100"]
  expected_tools:
    - name: log_training_session
  expected_db_state:
    - query: "SELECT COUNT(*) FROM practices WHERE name LIKE '%squat%'"
      expected_value: 1
    - query: "SELECT COUNT(*) FROM training_sets WHERE weight = 100 AND reps = 5"
      expected_value: 5
