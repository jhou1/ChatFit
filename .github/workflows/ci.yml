name: CI Auto-Merge Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Assuming standard Python 3.11, adjust if needed

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/uv sync --all-extras --dev

      - name: Run Quality Checks
        run: make quality

  verify:
    name: Verification and Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/uv sync --all-extras --dev

      - name: Run Verification
        run: make verify

  automerge:
    name: Enable Auto-Merge
    needs: [quality, verify]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --merge "$PR_URL"
